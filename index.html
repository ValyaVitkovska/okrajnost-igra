<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Геометричен куест</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.25)'
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
    }
    @media print {
      body * { visibility: hidden; }
      #certificate, #certificate * { visibility: visible; }
      #certificate {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STORAGE_KEY = 'geo-quest-local-game-v2';
    const RESULTS_KEY = 'geo-quest-results-v2';
    const BONUS_SECONDS_LIMIT = 120;

    const Icon = ({ children, className = 'w-5 h-5' }) => (
      <span className={className + ' inline-flex items-center justify-center'}>{children}</span>
    );

    function mulberry32(a) {
      return function () {
        let t = (a += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function generateQuestionsForTeam(seed) {
      const rnd = mulberry32(seed);
      const randInt = (min, max) => Math.floor(rnd() * (max - min + 1)) + min;
      const randEven = (min, max) => {
        let n = randInt(min, max);
        return n % 2 === 0 ? n : n + 1;
      };

      const a1 = randInt(50, 130);
      const a2 = randInt(30, 80);
      const a4 = randEven(60, 160);
      const a5_1 = randEven(30, 80);
      const a5_2 = randEven(40, 100);
      const a6_1 = randEven(100, 160);
      const a6_2 = randEven(20, 60);
      const a7 = randInt(70, 110);
      const a8 = randInt(25, 65);
      const a9 = randEven(80, 150);
      const a10_1 = randEven(120, 160);
      const a10_2 = randEven(30, 70);
      const a11 = randEven(50, 140);
      const a12 = randInt(30, 75);
      const a13_ang = randInt(50, 80);
      const a13_arc = randInt(30, a13_ang * 2 - 20);
      const a14 = randInt(85, 120);
      const a15_ang = randInt(20, 40);
      const a15_arc = randInt(20, 50);

      return [
        {
          q: `1. Централен ъгъл има мярка ${a1}°. Колко градуса е мярката на прилежащата му дъга? (само число)`,
          a: `${a1}`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 100 20 M 100 100 L 175 70" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <circle cx="100" cy="100" r="4" fill="#818cf8" />
              <text x="108" y="85" fill="#cbd5e1" fontSize="16">{a1}°</text>
              <text x="145" y="35" fill="#facc15" fontSize="22" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `2. Вписан ъгъл отсича дъга с мярка ${a2 * 2}°. Колко градуса е самият ъгъл?`,
          a: `${a2}`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 20 L 40 150 M 100 20 L 160 150" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <text x="95" y="45" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
              <text x="80" y="190" fill="#cbd5e1" fontSize="16">{a2 * 2}°</text>
            </svg>
          )
        },
        {
          q: `3. Колко градуса е мярката на вписан ъгъл, който се опира на диаметъра на окръжността?`,
          a: `90`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 20 100 L 180 100" stroke="#64748b" strokeDasharray="5,5" strokeWidth="2" />
              <path d="M 20 100 L 80 23 L 180 100" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="75" y="55" fill="#facc15" fontSize="22" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `4. Периферен ъгъл отсича дъга от ${a4}°. Колко градуса е мярката на ъгъла?`,
          a: `${a4 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 10 180 L 190 180" stroke="#22d3ee" strokeWidth="3" />
              <path d="M 100 180 L 175 60" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="180" r="5" fill="#e2e8f0" />
              <text x="140" y="130" fill="#cbd5e1" fontSize="16">{a4}°</text>
              <text x="125" y="170" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `5. Две хорди се пресичат вътре в окръжността и отсичат срещуположни дъги от ${a5_1}° и ${a5_2}°. Колко градуса е ъгълът между тях?`,
          a: `${(a5_1 + a5_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 40 L 160 160 M 40 160 L 160 40" stroke="#818cf8" strokeWidth="3" />
              <text x="110" y="105" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="90" y="25" fill="#cbd5e1" fontSize="16">{a5_1}°</text>
              <text x="90" y="192" fill="#cbd5e1" fontSize="16">{a5_2}°</text>
            </svg>
          )
        },
        {
          q: `6. Две секущи се пресичат извън окръжността. Те отсичат дъги от ${a6_1}° и ${a6_2}°. Колко градуса е ъгълът между секущите?`,
          a: `${(a6_1 - a6_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 45 55 M 100 190 L 155 55" stroke="#818cf8" strokeWidth="3" />
              <text x="95" y="180" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="80" y="15" fill="#cbd5e1" fontSize="16">{a6_1}°</text>
              <text x="85" y="125" fill="#cbd5e1" fontSize="16">{a6_2}°</text>
            </svg>
          )
        },
        {
          q: `7. В окръжност е вписан четириъгълник ABCD. Ако ∠A = ${a7}°, колко градуса е срещуположният му ъгъл C?`,
          a: `${180 - a7}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 50 L 150 40 L 170 140 L 50 160 Z" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="50" y="75" fill="#cbd5e1" fontSize="16">{a7}°</text>
              <text x="135" y="130" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `8. Вписаните ъгли ABD и ACD се опират на една и съща дъга AD. Ако ∠ABD = ${a8}°, колко градуса е ∠ACD?`,
          a: `${a8}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 150 L 60 30 L 160 150" stroke="#818cf8" strokeWidth="3" fill="none" />
              <path d="M 40 150 L 140 30 L 160 150" stroke="#22d3ee" strokeWidth="3" fill="none" strokeDasharray="4,4" />
              <text x="55" y="55" fill="#cbd5e1" fontSize="16">{a8}°</text>
              <text x="120" y="55" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `9. Централен и вписан ъгъл се опират на една и съща дъга. Ако централният е ${a9}°, колко е вписаният?`,
          a: `${a9 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 30 140 M 100 100 L 170 140" stroke="#64748b" strokeWidth="2" />
              <path d="M 100 20 L 30 140 M 100 20 L 170 140" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="100" r="4" fill="#94a3b8" />
              <text x="85" y="125" fill="#cbd5e1" fontSize="16">{a9}°</text>
              <text x="95" y="45" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `10. Допирателна и секуща се пресичат извън окръжността. Те отсичат дъги от ${a10_1}° и ${a10_2}°. Колко градуса е ъгълът между тях?`,
          a: `${(a10_1 - a10_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 160 80" stroke="#22d3ee" strokeWidth="3" />
              <path d="M 100 190 L 40 80" stroke="#818cf8" strokeWidth="3" />
              <text x="95" y="175" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="80" y="15" fill="#cbd5e1" fontSize="16">{a10_1}°</text>
              <text x="50" y="120" fill="#cbd5e1" fontSize="16">{a10_2}°</text>
            </svg>
          )
        },
        {
          q: `11. Ъгълът между допирателна и хорда през точката на допиране отсича дъга от ${a11}°. Колко градуса е този ъгъл?`,
          a: `${a11 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 10 180 L 190 180" stroke="#22d3ee" strokeWidth="3" />
              <path d="M 100 180 L 40 40" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="180" r="5" fill="#e2e8f0" />
              <text x="40" y="120" fill="#cbd5e1" fontSize="16">{a11}°</text>
              <text x="120" y="170" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `12. Вписан ъгъл има мярка ${a12}°. Колко градуса е съответният му централен ъгъл?`,
          a: `${a12 * 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 30 140 M 100 100 L 170 140" stroke="#818cf8" strokeWidth="3" />
              <path d="M 100 20 L 30 140 M 100 20 L 170 140" stroke="#64748b" strokeWidth="2" />
              <circle cx="100" cy="100" r="4" fill="#94a3b8" />
              <text x="90" y="45" fill="#cbd5e1" fontSize="16">{a12}°</text>
              <text x="95" y="125" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `13. Две хорди се пресичат и сключват ъгъл от ${a13_ang}°. Ако едната отсечена дъга е ${a13_arc}°, колко е срещуположната ѝ дъга?`,
          a: `${a13_ang * 2 - a13_arc}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 40 L 160 160 M 40 160 L 160 40" stroke="#818cf8" strokeWidth="3" />
              <text x="110" y="105" fill="#cbd5e1" fontSize="16">{a13_ang}°</text>
              <text x="90" y="25" fill="#cbd5e1" fontSize="16">{a13_arc}°</text>
              <text x="90" y="195" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `14. В окръжност е вписан четириъгълник ABCD. Ако ∠B = ${a14}°, колко градуса е срещуположният му ъгъл D?`,
          a: `${180 - a14}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 50 L 150 40 L 170 140 L 50 160 Z" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="135" y="65" fill="#cbd5e1" fontSize="16">{a14}° (B)</text>
              <text x="60" y="145" fill="#facc15" fontSize="18" fontWeight="bold">? (D)</text>
            </svg>
          )
        },
        {
          q: `15. Секущи сключват ъгъл от ${a15_ang}°. Ако по-малката отсечена дъга е ${a15_arc}°, колко градуса е по-голямата?`,
          a: `${a15_ang * 2 + a15_arc}`,
          points: 25,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 45 55 M 100 190 L 155 55" stroke="#818cf8" strokeWidth="3" />
              <text x="95" y="180" fill="#cbd5e1" fontSize="16">{a15_ang}°</text>
              <text x="80" y="15" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
              <text x="85" y="125" fill="#cbd5e1" fontSize="16">{a15_arc}°</text>
            </svg>
          )
        }
      ];
    }

    function formatTime(ms) {
      if (!ms || ms < 0) return '00:00';
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function saveGame(game) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
    }
    function loadGame() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }
    function clearGame() {
