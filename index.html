<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Геометричен куест</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.25)'
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
    }
    @media print {
      body * { visibility: hidden; }
      #certificate, #certificate * { visibility: visible; }
      #certificate {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const STORAGE_KEY = 'geo-quest-local-game-v2';
    const RESULTS_KEY = 'geo-quest-results-v2';
    const BONUS_SECONDS_LIMIT = 120;

    const Icon = ({ children, className = 'w-5 h-5' }) => (
      <span className={className + ' inline-flex items-center justify-center'}>{children}</span>
    );

    function mulberry32(a) {
      return function () {
        let t = (a += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function generateQuestionsForTeam(seed) {
      const rnd = mulberry32(seed);
      const randInt = (min, max) => Math.floor(rnd() * (max - min + 1)) + min;
      const randEven = (min, max) => {
        let n = randInt(min, max);
        return n % 2 === 0 ? n : n + 1;
      };

      const a1 = randInt(50, 130);
      const a2 = randInt(30, 80);
      const a4 = randEven(60, 160);
      const a5_1 = randEven(30, 80);
      const a5_2 = randEven(40, 100);
      const a6_1 = randEven(100, 160);
      const a6_2 = randEven(20, 60);
      const a7 = randInt(70, 110);
      const a8 = randInt(25, 65);
      const a9 = randEven(80, 150);
      const a10_1 = randEven(120, 160);
      const a10_2 = randEven(30, 70);
      const a11 = randEven(50, 140);
      const a12 = randInt(30, 75);
      const a13_ang = randInt(50, 80);
      const a13_arc = randInt(30, a13_ang * 2 - 20);
      const a14 = randInt(85, 120);
      const a15_ang = randInt(20, 40);
      const a15_arc = randInt(20, 50);

      return [
        {
          q: `1. Централен ъгъл има мярка ${a1}°. Колко градуса е мярката на прилежащата му дъга? (само число)`,
          a: `${a1}`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 100 20 M 100 100 L 175 70" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <circle cx="100" cy="100" r="4" fill="#818cf8" />
              <text x="108" y="85" fill="#cbd5e1" fontSize="16">{a1}°</text>
              <text x="145" y="35" fill="#facc15" fontSize="22" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `2. Вписан ъгъл отсича дъга с мярка ${a2 * 2}°. Колко градуса е самият ъгъл?`,
          a: `${a2}`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 20 L 40 150 M 100 20 L 160 150" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <text x="95" y="45" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
              <text x="80" y="190" fill="#cbd5e1" fontSize="16">{a2 * 2}°</text>
            </svg>
          )
        },
        {
          q: `3. Колко градуса е мярката на вписан ъгъл, който се опира на диаметъра на окръжността?`,
          a: `90`,
          points: 10,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 20 100 L 180 100" stroke="#64748b" strokeDasharray="5,5" strokeWidth="2" />
              <path d="M 20 100 L 80 23 L 180 100" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="75" y="55" fill="#facc15" fontSize="22" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `4. Периферен ъгъл отсича дъга от ${a4}°. Колко градуса е мярката на ъгъла?`,
          a: `${a4 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 10 180 L 190 180" stroke="#22d3ee" strokeWidth="3" />
              <path d="M 100 180 L 175 60" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="180" r="5" fill="#e2e8f0" />
              <text x="140" y="130" fill="#cbd5e1" fontSize="16">{a4}°</text>
              <text x="125" y="170" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `5. Хордите AC и BD се пресичат в точка M вътре в окръжността и отсичат срещуположни дъги с мерки ${a5_1}° и ${a5_2}°. Колко градуса е отбелязаният ъгъл ∠AMD?`,
          a: `${(a5_1 + a5_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 43 43 L 157 157 M 43 157 L 157 43" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <path d="M 85.9 85.9 A 20 20 0 0 1 114.1 85.9" stroke="#facc15" strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="100" y="75" textAnchor="middle" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="30" y="35" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="170" y="35" fill="#e2e8f0" fontSize="14" fontWeight="bold">D</text>
              <text x="30" y="175" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="170" y="175" fill="#e2e8f0" fontSize="14" fontWeight="bold">C</text>
              <text x="100" y="120" textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold">M</text>
              <text x="100" y="15" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a5_1}°</text>
              <text x="100" y="195" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a5_2}°</text>
            </svg>
          )
        },
        {
          q: `6. Секущите MAB и MCD се пресичат в точка M извън окръжността. Те отсичат дъги с мерки ${a6_1}° и ${a6_2}°. Колко градуса е отбелязаният външен ъгъл ∠AMD?`,
          a: `${(a6_1 - a6_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 36.6 54.1 M 100 190 L 163.4 54.1" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <path d="M 89.4 167.3 A 25 25 0 0 1 110.6 167.3" stroke="#facc15" strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="100" y="160" textAnchor="middle" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="60" y="135" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="30" y="60" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="140" y="135" fill="#e2e8f0" fontSize="14" fontWeight="bold">C</text>
              <text x="170" y="60" fill="#e2e8f0" fontSize="14" fontWeight="bold">D</text>
              <text x="100" y="205" textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold">M</text>
              <text x="100" y="15" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a6_1}°</text>
              <text x="100" y="145" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a6_2}°</text>
            </svg>
          )
        },
        {
          q: `7. В окръжност е вписан четириъгълник ABCD. Ако ∠A = ${a7}°, колко градуса е срещуположният му ъгъл C?`,
          a: `${180 - a7}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 50 L 150 40 L 170 140 L 50 160 Z" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="50" y="75" fill="#cbd5e1" fontSize="16">{a7}°</text>
              <text x="135" y="130" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `8. Вписаните ъгли ∠ABD и ∠ACD се опират на една и съща дъга AD. Ако ∠ABD = ${a8}°, колко градуса е ∠ACD?`,
          a: `${a8}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 150 L 60 30 L 160 150" stroke="#818cf8" strokeWidth="3" fill="none" />
              <path d="M 40 150 L 140 30 L 160 150" stroke="#22d3ee" strokeWidth="3" fill="none" strokeDasharray="4,4" />
              <text x="36" y="166" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="54" y="24" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="138" y="24" fill="#e2e8f0" fontSize="14" fontWeight="bold">C</text>
              <text x="162" y="166" fill="#e2e8f0" fontSize="14" fontWeight="bold">D</text>
              <text x="55" y="55" fill="#cbd5e1" fontSize="16">{a8}°</text>
              <text x="120" y="55" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `9. Централен и вписан ъгъл се опират на една и съща дъга. Ако централният е ${a9}°, колко е вписаният?`,
          a: `${a9 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 30 140 M 100 100 L 170 140" stroke="#64748b" strokeWidth="2" />
              <path d="M 100 20 L 30 140 M 100 20 L 170 140" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="100" r="4" fill="#94a3b8" />
              <text x="85" y="125" fill="#cbd5e1" fontSize="16">{a9}°</text>
              <text x="95" y="45" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `10. Допирателната MT и секущата MAB се пресичат в точка M извън окръжността. Те отсичат дъги с мерки ${a10_1}° и ${a10_2}°. Колко градуса е отбелязаният външен ъгъл ∠TMB?`,
          a: `${(a10_1 - a10_2) / 2}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 165 90" stroke="#22d3ee" strokeWidth="3" strokeLinecap="round" />
              <path d="M 100 190 L 28 66" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <path d="M 87.5 168.4 A 25 25 0 0 1 113.6 169.0" stroke="#facc15" strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="100" y="160" textAnchor="middle" fill="#facc15" fontSize="18" fontWeight="bold">?</text>
              <text x="50" y="135" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="25" y="80" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="165" y="115" fill="#22d3ee" fontSize="14" fontWeight="bold">T</text>
              <text x="100" y="205" textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold">M</text>
              <text x="100" y="15" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a10_1}°</text>
              <text x="100" y="145" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a10_2}°</text>
            </svg>
          )
        },
        {
          q: `11. Ъгълът между допирателна и хорда през точката на допиране отсича дъга от ${a11}°. Колко градуса е този ъгъл?`,
          a: `${a11 / 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 10 180 L 190 180" stroke="#22d3ee" strokeWidth="3" />
              <path d="M 100 180 L 40 40" stroke="#818cf8" strokeWidth="3" />
              <circle cx="100" cy="180" r="5" fill="#e2e8f0" />
              <text x="45" y="95" fill="#cbd5e1" fontSize="16">{a11}°</text>
              <path d="M 80 180 A 20 20 0 0 1 92 162" stroke="#facc15" strokeWidth="3" fill="none" />
              <text x="65" y="165" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `12. Вписан ъгъл има мярка ${a12}°. Колко градуса е съответният му централен ъгъл?`,
          a: `${a12 * 2}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 100 L 30 140 M 100 100 L 170 140" stroke="#818cf8" strokeWidth="3" />
              <path d="M 100 20 L 30 140 M 100 20 L 170 140" stroke="#64748b" strokeWidth="2" />
              <circle cx="100" cy="100" r="4" fill="#94a3b8" />
              <text x="90" y="45" fill="#cbd5e1" fontSize="16">{a12}°</text>
              <text x="95" y="125" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `13. Хордите AC и BD се пресичат в точка M и сключват отбелязания ъгъл ${a13_ang}°. Ако едната отсечена дъга е ${a13_arc}°, колко е срещуположната ѝ дъга?`,
          a: `${a13_ang * 2 - a13_arc}`,
          points: 20,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 43 43 L 157 157 M 43 157 L 157 43" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <path d="M 85.9 85.9 A 20 20 0 0 1 114.1 85.9" stroke="#facc15" strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="100" y="75" textAnchor="middle" fill="#e2e8f0" fontSize="16">{a13_ang}°</text>
              <text x="30" y="35" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="170" y="35" fill="#e2e8f0" fontSize="14" fontWeight="bold">D</text>
              <text x="30" y="175" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="170" y="175" fill="#e2e8f0" fontSize="14" fontWeight="bold">C</text>
              <text x="100" y="120" textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold">M</text>
              <text x="100" y="15" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a13_arc}°</text>
              <text x="100" y="195" textAnchor="middle" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
            </svg>
          )
        },
        {
          q: `14. В окръжност е вписан четириъгълник ABCD. Ако ∠B = ${a14}°, колко градуса е срещуположният му ъгъл D?`,
          a: `${180 - a14}`,
          points: 15,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="100" r="80" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 40 50 L 150 40 L 170 140 L 50 160 Z" stroke="#818cf8" strokeWidth="3" fill="none" />
              <text x="135" y="65" fill="#cbd5e1" fontSize="16">{a14}° (B)</text>
              <text x="60" y="145" fill="#facc15" fontSize="18" fontWeight="bold">? (D)</text>
            </svg>
          )
        },
        {
          q: `15. Секущите MAB и MCD сключват отбелязания външен ъгъл ${a15_ang}°. Ако по-малката отсечена дъга е ${a15_arc}°, колко градуса е по-голямата дъга?`,
          a: `${a15_ang * 2 + a15_arc}`,
          points: 25,
          svg: (
            <svg viewBox="0 0 200 200" className="w-full h-48">
              <circle cx="100" cy="80" r="60" stroke="#64748b" strokeWidth="2" fill="none" />
              <path d="M 100 190 L 36.6 54.1 M 100 190 L 163.4 54.1" stroke="#818cf8" strokeWidth="3" strokeLinecap="round" />
              <path d="M 89.4 167.3 A 25 25 0 0 1 110.6 167.3" stroke="#facc15" strokeWidth="3" fill="none" strokeLinecap="round" />
              <text x="100" y="160" textAnchor="middle" fill="#e2e8f0" fontSize="16">{a15_ang}°</text>
              <text x="60" y="135" fill="#e2e8f0" fontSize="14" fontWeight="bold">A</text>
              <text x="30" y="60" fill="#e2e8f0" fontSize="14" fontWeight="bold">B</text>
              <text x="140" y="135" fill="#e2e8f0" fontSize="14" fontWeight="bold">C</text>
              <text x="170" y="60" fill="#e2e8f0" fontSize="14" fontWeight="bold">D</text>
              <text x="100" y="205" textAnchor="middle" fill="#f8fafc" fontSize="13" fontWeight="bold">M</text>
              <text x="100" y="15" textAnchor="middle" fill="#facc15" fontSize="20" fontWeight="bold">?</text>
              <text x="100" y="145" textAnchor="middle" fill="#cbd5e1" fontSize="16">{a15_arc}°</text>
            </svg>
          )
        }
      ];
    }

    function formatTime(ms) {
      if (!ms || ms < 0) return '00:00';
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function saveGame(game) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
    }
    function loadGame() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }
    function clearGame() {
      localStorage.removeItem(STORAGE_KEY);
    }
    function loadResults() {
      try {
        const raw = localStorage.getItem(RESULTS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }
    function saveResults(results) {
      localStorage.setItem(RESULTS_KEY, JSON.stringify(results));
    }

    function getCertificateTier(totalScoreWithBonus) {
      if (totalScoreWithBonus >= 245) {
        return { key: 'gold', title: 'Златен сертификат', badge: '🥇', border: 'border-yellow-400', text: 'text-yellow-300', softBg: 'bg-yellow-500/10', gradient: 'from-yellow-400 via-amber-300 to-yellow-500' };
      }
      if (totalScoreWithBonus >= 205) {
        return { key: 'silver', title: 'Сребърен сертификат', badge: '🥈', border: 'border-slate-300', text: 'text-slate-200', softBg: 'bg-slate-300/10', gradient: 'from-slate-200 via-slate-300 to-slate-400' };
      }
      return { key: 'bronze', title: 'Бронзов сертификат', badge: '🥉', border: 'border-orange-500', text: 'text-orange-300', softBg: 'bg-orange-500/10', gradient: 'from-orange-400 via-amber-600 to-orange-700' };
    }

    function getSortedResults(results) {
      return [...results].sort((a, b) => {
        if (b.totalScore !== a.totalScore) return b.totalScore - a.totalScore;
        return a.durationMs - b.durationMs;
      });
    }

    function buildResultCode(team, totalScore, durationMs) {
      return `${team.seed}-${totalScore}-${Math.floor(durationMs / 1000)}`;
    }

    function App() {
      const [currentView, setCurrentView] = useState('menu');
      const [myTeam, setMyTeam] = useState(null);
      const [teamNameInput, setTeamNameInput] = useState('');
      const [answerInput, setAnswerInput] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [currentTime, setCurrentTime] = useState(Date.now());
      const [savedResults, setSavedResults] = useState([]);

      useEffect(() => {
        const interval = setInterval(() => setCurrentTime(Date.now()), 1000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        const savedGame = loadGame();
        const existingResults = loadResults();
        setSavedResults(existingResults);
        if (savedGame) {
          setMyTeam(savedGame);
          setCurrentView(savedGame.completed ? 'final' : 'quiz');
        }
      }, []);

      const durationMs = useMemo(() => {
        if (!myTeam?.startTime) return 0;
        if (myTeam.completed && myTeam.endTime) return myTeam.endTime - myTeam.startTime;
        return currentTime - myTeam.startTime;
      }, [myTeam, currentTime]);

      const speedBonus = myTeam?.completed && durationMs < BONUS_SECONDS_LIMIT * 1000 ? 1 : 0;
      const totalScore = (myTeam?.score || 0) + speedBonus;
      const certificate = getCertificateTier(totalScore);
      const today = new Date().toLocaleDateString('bg-BG');
      const resultCode = myTeam ? buildResultCode(myTeam, totalScore, durationMs) : '';
      const allSortedResults = getSortedResults(savedResults);
      const topThree = allSortedResults.slice(0, 3);
      const restResults = allSortedResults.slice(3);

      const myRank = myTeam?.completed
        ? allSortedResults.findIndex((r) => r.resultCode === resultCode) + 1
        : 0;

      const registerCompletedResult = (teamData) => {
        const finalDuration = teamData.endTime - teamData.startTime;
        const bonus = finalDuration < BONUS_SECONDS_LIMIT * 1000 ? 1 : 0;
        const total = teamData.score + bonus;
        const resultEntry = {
          name: teamData.name,
          baseScore: teamData.score,
          speedBonus: bonus,
          totalScore: total,
          durationMs: finalDuration,
          seed: teamData.seed,
          completedAt: teamData.endTime,
          resultCode: buildResultCode(teamData, total, finalDuration)
        };
        const previous = loadResults();
        const exists = previous.some((r) => r.resultCode === resultEntry.resultCode);
        if (!exists) {
          const updated = [...previous, resultEntry];
          saveResults(updated);
          setSavedResults(updated);
        } else {
          setSavedResults(previous);
        }
      };

      const handleTeamLogin = (e) => {
        e.preventDefault();
        const name = teamNameInput.trim();
        if (!name) return;
        const randomSeed = Math.floor(Math.random() * 1000000);
        const newTeam = {
          name,
          score: 0,
          questionIndex: 0,
          completed: false,
          startTime: Date.now(),
          endTime: null,
          seed: randomSeed
        };
        setMyTeam(newTeam);
        saveGame(newTeam);
        setCurrentView('quiz');
      };

      const handleAnswerSubmit = (e) => {
        e.preventDefault();
        if (!myTeam) return;
        const teamQuestions = generateQuestionsForTeam(myTeam.seed || 12345);
        const currentQuestion = teamQuestions[myTeam.questionIndex];
        const normalizedInput = answerInput.trim().toLowerCase().replace(',', '.');
        const normalizedAnswer = currentQuestion.a.toLowerCase().replace(',', '.');

        if (normalizedInput === normalizedAnswer) {
          setFeedback({ type: 'success', text: `Верен отговор! Печелите ${currentQuestion.points} точки.` });
          const isCompleted = myTeam.questionIndex + 1 >= teamQuestions.length;
          const updatedTeam = {
            ...myTeam,
            score: myTeam.score + currentQuestion.points,
            questionIndex: myTeam.questionIndex + 1,
            completed: isCompleted,
            endTime: isCompleted ? Date.now() : null
          };
          setMyTeam(updatedTeam);
          saveGame(updatedTeam);
          setAnswerInput('');

          if (isCompleted) {
            registerCompletedResult(updatedTeam);
            setTimeout(() => {
              setFeedback(null);
              setCurrentView('final');
            }, 1000);
          } else {
            setTimeout(() => setFeedback(null), 2000);
          }
        } else {
          setFeedback({ type: 'error', text: 'Грешен отговор. Опитайте отново!' });
          setTimeout(() => setFeedback(null), 2500);
        }
      };

      const startNewGame = () => {
        clearGame();
        setMyTeam(null);
        setTeamNameInput('');
        setAnswerInput('');
        setFeedback(null);
        setCurrentView('menu');
      };

      const downloadPDF = () => {
        const element = document.getElementById('certificate');
        if (!element || !window.html2pdf) {
          alert('Липсва библиотеката html2pdf.js.');
          return;
        }
        const opt = {
          margin: 8,
          filename: `GeoQuest-${myTeam?.name || 'rezultat'}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        window.html2pdf().set(opt).from(element).save();
      };

      if (currentView === 'menu') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-6">
            <div className="text-center max-w-3xl w-full">
              <div className="flex justify-center mb-6">
                <div className="bg-indigo-600 p-4 rounded-full shadow-soft">
                  <span className="text-4xl">📐</span>
                </div>
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                Геометричен куест
              </h1>
              <p className="text-slate-300 text-lg mb-2">Идея и педагогически решения: Валя Витковска</p>
              <p className="text-slate-500 mb-10">Локална игра за работа в клас. Всеки отбор решава свои задачи и накрая генерира PDF или скрийншот на резултата.</p>

              <div className="grid md:grid-cols-3 gap-4 mb-12 text-left">
                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5">
                  <p className="font-bold text-indigo-300 mb-2">Сертификати</p>
                  <p className="text-slate-400 text-sm">Златен, сребърен или бронзов според крайния резултат.</p>
                </div>
                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5">
                  <p className="font-bold text-emerald-300 mb-2">Бонус</p>
                  <p className="text-slate-400 text-sm">Под 2 минути = +1 бонус точка.</p>
                </div>
                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5">
                  <p className="font-bold text-yellow-300 mb-2">Отличаване</p>
                  <p className="text-slate-400 text-sm">Най-добрите 3 резултата ще бъдат отличени.</p>
                </div>
              </div>

              <div className="space-y-4 flex flex-col items-center">
                <button onClick={() => setCurrentView('teamLogin')} className="w-full max-w-sm bg-indigo-600 hover:bg-indigo-500 text-white py-4 px-6 rounded-xl font-bold text-lg transition-all shadow-soft">
                  Вход за отбор
                </button>
                {myTeam && !myTeam.completed && (
                  <button onClick={() => setCurrentView('quiz')} className="w-full max-w-sm bg-slate-800 border-2 border-slate-700 hover:border-slate-500 text-slate-200 py-4 px-6 rounded-xl font-bold text-lg transition-all">
                    Продължи играта
                  </button>
                )}
                <button onClick={() => setCurrentView('resultsBoard')} className="w-full max-w-sm bg-slate-800 border-2 border-slate-700 hover:border-slate-500 text-slate-200 py-4 px-6 rounded-xl font-bold text-lg transition-all">
                  Отличени резултати
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (currentView === 'teamLogin') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-6">
            <div className="w-full max-w-md bg-slate-800 rounded-2xl p-8 shadow-soft border border-slate-700">
              <h2 className="text-2xl font-bold mb-3 text-center">Регистрация на отбор</h2>
              <p className="text-center text-slate-400 text-sm mb-6">Използвайте кратко и ясно име на отбора.</p>
              <form onSubmit={handleTeamLogin} className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-slate-400 mb-2">Име на вашия отбор</label>
                  <input type="text" required value={teamNameInput} onChange={(e) => setTeamNameInput(e.target.value)} placeholder="напр. Питагоровци" className="w-full bg-slate-900 border border-slate-700 rounded-lg py-3 px-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition-colors">Започни играта</button>
              </form>
              <button onClick={() => setCurrentView('menu')} className="w-full mt-4 text-slate-400 hover:text-white text-sm">← Назад към менюто</button>
            </div>
          </div>
        );
      }

      if (currentView === 'quiz') {
        if (!myTeam) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center">Зареждане...</div>;
        const teamQuestions = generateQuestionsForTeam(myTeam.seed || 12345);
        const currentQuestion = teamQuestions[myTeam.questionIndex];
        
        if (!currentQuestion) {
          setCurrentView('final');
          return null;
        }
        
        const progress = Math.round((myTeam.questionIndex / teamQuestions.length) * 100);

        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center p-6 pt-12">
            <div className="w-full max-w-lg flex justify-between items-center mb-8 gap-4">
              <div>
                <span className="text-xs text-slate-500 uppercase font-bold tracking-wider">Отбор</span>
                <div className="font-bold text-lg">{myTeam.name}</div>
              </div>
              <div className="text-center bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 shadow-inner">
                <span className="font-mono font-bold text-xl tracking-wider text-slate-200">{formatTime(durationMs)}</span>
              </div>
              <div className="text-right">
                <span className="text-xs text-slate-500 uppercase font-bold tracking-wider">Точки</span>
                <div className="font-bold text-xl text-indigo-400">{myTeam.score}</div>
              </div>
            </div>

            <div className="w-full max-w-lg bg-slate-800 h-2 rounded-full mb-8 overflow-hidden">
              <div className="bg-indigo-500 h-full transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="w-full max-w-lg bg-slate-800 rounded-2xl p-6 sm:p-8 shadow-soft border border-slate-700">
              <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                <h3 className="text-sm font-bold text-indigo-400 uppercase tracking-wider">Задача {myTeam.questionIndex + 1} от {teamQuestions.length}</h3>
                <span className="text-sm font-bold bg-slate-700 text-slate-300 px-3 py-1 rounded-full">{currentQuestion.points} точки</span>
              </div>
              
              <p className="text-lg md:text-xl font-medium mb-6 leading-relaxed">{currentQuestion.q}</p>
              
              <div className="bg-slate-900 rounded-xl p-4 mb-8 border border-slate-700 flex justify-center items-center">
                {currentQuestion.svg}
              </div>

              <form onSubmit={handleAnswerSubmit} className="space-y-4">
                <input 
                  type="text" 
                  value={answerInput} 
                  onChange={(e) => setAnswerInput(e.target.value)}
                  placeholder="Въведете вашия отговор тук..." 
                  className="w-full bg-slate-900 border-2 border-slate-700 rounded-xl py-4 px-4 text-center text-xl font-bold text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/50" 
                  autoFocus 
                  required
                />
                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold text-lg transition-all shadow-soft active:scale-[0.98]">
                  Потвърди отговор
                </button>
              </form>

              {feedback && (
                <div className={`mt-6 p-4 rounded-xl text-center font-bold animate-pulse ${feedback.type === 'success' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-rose-500/20 text-rose-400 border border-rose-500/50'}`}>
                  {feedback.text}
                </div>
              )}
            </div>

            <div className="mt-8 w-full max-w-lg text-center">
              <button onClick={() => setCurrentView('menu')} className="text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors">
                Изход (Напредъкът е запазен)
              </button>
            </div>
          </div>
        );
      }

      if (currentView === 'final') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center p-6 py-12 overflow-auto">
            <div className="w-full max-w-4xl no-print flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
              <button onClick={() => setCurrentView('menu')} className="bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 px-4 rounded-lg font-medium transition-colors border border-slate-700">
                ← Към менюто
              </button>
              <div className="flex gap-4">
                <button onClick={downloadPDF} className="bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-6 rounded-lg font-bold transition-all shadow-lg flex items-center gap-2">
                  <span>Изтегли PDF</span>
                </button>
                <button onClick={startNewGame} className="bg-emerald-600 hover:bg-emerald-500 text-white py-2 px-6 rounded-lg font-bold transition-all shadow-lg">
                  Нова игра
                </button>
              </div>
            </div>

            {/* Certificate Area (Printable) */}
            <div id="certificate" className={`w-full max-w-4xl bg-slate-800 rounded-3xl p-8 sm:p-12 border-4 ${certificate.border} shadow-2xl relative overflow-hidden`}>
              {/* Decorative elements */}
              <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-y-1/2 translate-x-1/3 blur-3xl"></div>
              <div className="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500 opacity-10 rounded-full translate-y-1/3 -translate-x-1/3 blur-3xl"></div>
              
              <div className="relative z-10 text-center">
                <div className={`inline-block mb-6 ${certificate.softBg} rounded-full p-4`}>
                  <span className="text-6xl">{certificate.badge}</span>
                </div>
                
                <h1 className={`text-4xl sm:text-5xl font-extrabold mb-2 uppercase tracking-widest bg-clip-text text-transparent bg-gradient-to-r ${certificate.gradient}`}>
                  {certificate.title}
                </h1>
                <p className="text-slate-400 text-lg mb-10 tracking-widest uppercase">За отлично представяне</p>
                
                <p className="text-slate-300 text-xl mb-2">Връчва се на отбор:</p>
                <h2 className="text-4xl sm:text-5xl font-bold text-white mb-12 py-4 border-y border-slate-700/50 bg-slate-800/50 rounded-xl mx-auto max-w-2xl">
                  {myTeam.name}
                </h2>
                
                <div className="grid sm:grid-cols-3 gap-6 mb-12">
                  <div className="bg-slate-900/50 rounded-2xl p-6 border border-slate-700/50">
                    <p className="text-slate-400 text-sm uppercase tracking-wider mb-2">Време</p>
                    <p className="text-3xl font-mono font-bold text-white">{formatTime(durationMs)}</p>
                  </div>
                  <div className="bg-slate-900/50 rounded-2xl p-6 border border-slate-700/50 relative overflow-hidden">
                    <div className={`absolute inset-0 bg-gradient-to-br ${certificate.gradient} opacity-10`}></div>
                    <p className="text-slate-400 text-sm uppercase tracking-wider mb-2 relative z-10">Общо Точки</p>
                    <p className={`text-4xl font-bold relative z-10 ${certificate.text}`}>{totalScore}</p>
                  </div>
                  <div className="bg-slate-900/50 rounded-2xl p-6 border border-slate-700/50">
                    <p className="text-slate-400 text-sm uppercase tracking-wider mb-2">База + Бонус</p>
                    <p className="text-2xl font-bold text-slate-300">{myTeam.score} + {speedBonus}</p>
                  </div>
                </div>

                <div className="flex flex-col sm:flex-row justify-between items-center text-sm text-slate-500 pt-8 border-t border-slate-700/50 mt-8 gap-4">
                  <p>Геометричен куест &copy; {new Date().getFullYear()}</p>
                  <p className="font-mono bg-slate-900 px-3 py-1 rounded">Код: {resultCode}</p>
                  <p>Дата: {today}</p>
                </div>
              </div>
            </div>
            
            {myRank > 0 && (
              <div className="w-full max-w-4xl text-center mt-8 no-print text-slate-400 bg-slate-800 py-3 rounded-xl border border-slate-700">
                Вашият отбор се класира на <strong>{myRank}-ро</strong> място от общо {savedResults.length} записани резултата на това устройство.
              </div>
            )}
          </div>
        );
      }

      if (currentView === 'resultsBoard') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center p-6 pt-12">
            <div className="w-full max-w-3xl">
              <div className="flex justify-between items-center mb-10">
                <button onClick={() => setCurrentView('menu')} className="text-slate-400 hover:text-white transition-colors flex items-center gap-2">
                  <span>← Назад</span>
                </button>
                <h2 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                  Топ 3 Резултати
                </h2>
                <div className="w-20"></div> {/* Spacer for balance */}
              </div>

              {topThree.length === 0 ? (
                <div className="bg-slate-800 rounded-2xl p-12 text-center border border-slate-700">
                  <span className="text-6xl mb-4 block">🏆</span>
                  <p className="text-xl text-slate-300 mb-2">Все още няма запазени резултати.</p>
                  <p className="text-slate-500">Бъдете първия отбор, който ще остави своя отпечатък!</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {topThree.map((result, index) => {
                    const medals = ['🥇', '🥈', '🥉'];
                    const colors = [
                      'border-yellow-500 bg-yellow-500/10 text-yellow-400',
                      'border-slate-300 bg-slate-300/10 text-slate-200',
                      'border-orange-500 bg-orange-500/10 text-orange-400'
                    ];
                    return (
                      <div key={result.resultCode} className={`flex flex-col sm:flex-row items-center justify-between p-6 rounded-2xl border ${colors[index]} transition-transform hover:scale-[1.02]`}>
                        <div className="flex items-center gap-6 mb-4 sm:mb-0">
                          <span className="text-4xl">{medals[index]}</span>
                          <div>
                            <h3 className="text-xl font-bold text-white mb-1">{result.name}</h3>
                            <p className="text-sm opacity-80">{new Date(result.completedAt).toLocaleDateString('bg-BG')} • Код: {result.resultCode}</p>
                          </div>
                        </div>
                        <div className="flex gap-6 text-center">
                          <div>
                            <p className="text-xs uppercase tracking-wider opacity-70 mb-1">Време</p>
                            <p className="font-mono text-lg">{formatTime(result.durationMs)}</p>
                          </div>
                          <div>
                            <p className="text-xs uppercase tracking-wider opacity-70 mb-1">Точки</p>
                            <p className="text-2xl font-bold">{result.totalScore}</p>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  
                  {restResults.length > 0 && (
                    <div className="mt-12 pt-8 border-t border-slate-700">
                      <h3 className="text-xl font-bold text-slate-400 mb-6">Останали резултати</h3>
                      <div className="space-y-3">
                        {restResults.map((result, index) => (
                          <div key={result.resultCode} className="flex flex-col sm:flex-row items-center justify-between p-4 rounded-xl border border-slate-700 bg-slate-800/50">
                            <div className="flex items-center gap-4 mb-3 sm:mb-0">
                              <span className="text-lg font-bold text-slate-500 w-8 text-center">#{index + 4}</span>
                              <div>
                                <h3 className="font-bold text-slate-200">{result.name}</h3>
                                <p className="text-xs text-slate-500">{new Date(result.completedAt).toLocaleDateString('bg-BG')} • Код: {result.resultCode}</p>
                              </div>
                            </div>
                            <div className="flex gap-6 text-center">
                              <div>
                                <p className="text-[10px] uppercase tracking-wider text-slate-500 mb-0.5">Време</p>
                                <p className="font-mono text-sm text-slate-300">{formatTime(result.durationMs)}</p>
                              </div>
                              <div>
                                <p className="text-[10px] uppercase tracking-wider text-slate-500 mb-0.5">Точки</p>
                                <p className="text-lg font-bold text-slate-300">{result.totalScore}</p>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
